queue_rules:
  - name: Merge Bot
    allow_queue_branch_edit: true
merge_queue:
  skip_intermediate_results: true
pull_request_rules:
  - name: Automatic merge during office hours + hotfix support
    description: Merge when PR passes all branch protection during office hours,
      except for hotfix
    conditions:
      - "#approved-reviews-by >= 1"
      - or:
          - schedule = Mon-Fri 09:00-17:00[America/Chicago]
          - label = hotfix
    actions:
      merge: {}
  - name: Make sure PR are up to date before merging with rebase
    description: This automatically rebases PRs when they are out-of-date with the
      base branch to avoid semantic conflicts (next step is using a merge
      queue).
    conditions: []
    actions:
      rebase:
merge_protections:
  - name: Merge during working hours
    description: Make sure to merge only during working hours
    if:
      - base = main
    success_conditions:
      - "#approved-reviews-by >= 1"
      - schedule = Mon-Fri 09:00-17:00[America/Chicago]
