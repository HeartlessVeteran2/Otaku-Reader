<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bannerBg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#45b7d1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bannerBg)" rx="20"/>

  <!-- Floating sakura petals (scattered decoration) -->
  <!-- Petal: 5-point soft shape using ellipse clusters -->
  <g opacity="0.18">
    <!-- top-left cluster -->
    <ellipse cx="60"  cy="55"  rx="10" ry="6"  fill="#FFB6C1" transform="rotate(-20,60,55)"/>
    <ellipse cx="75"  cy="45"  rx="9"  ry="5"  fill="#FF69B4" transform="rotate(30,75,45)"/>
    <ellipse cx="45"  cy="70"  rx="8"  ry="5"  fill="#FFB6C1" transform="rotate(10,45,70)"/>
    <circle  cx="67"  cy="58"  r="4"   fill="#FF85A1"/>

    <!-- top-right cluster -->
    <ellipse cx="1100" cy="40"  rx="11" ry="6"  fill="#FFB6C1" transform="rotate(25,1100,40)"/>
    <ellipse cx="1115" cy="60"  rx="9"  ry="5"  fill="#FF69B4" transform="rotate(-15,1115,60)"/>
    <ellipse cx="1085" cy="55"  rx="8"  ry="5"  fill="#FFB6C1" transform="rotate(40,1085,55)"/>
    <circle  cx="1102" cy="52"  r="4"   fill="#FF85A1"/>

    <!-- mid-left cluster -->
    <ellipse cx="30"  cy="200" rx="10" ry="6"  fill="#FF69B4" transform="rotate(15,30,200)"/>
    <ellipse cx="50"  cy="215" rx="8"  ry="5"  fill="#FFB6C1" transform="rotate(-25,50,215)"/>
    <circle  cx="38"  cy="207" r="4"   fill="#FF85A1"/>

    <!-- mid-right cluster -->
    <ellipse cx="1160" cy="180" rx="11" ry="6"  fill="#FFB6C1" transform="rotate(-10,1160,180)"/>
    <ellipse cx="1145" cy="200" rx="9"  ry="5"  fill="#FF69B4" transform="rotate(30,1145,200)"/>
    <circle  cx="1154" cy="190" r="4"   fill="#FF85A1"/>

    <!-- bottom-left cluster -->
    <ellipse cx="80"  cy="340" rx="10" ry="6"  fill="#FFB6C1" transform="rotate(20,80,340)"/>
    <ellipse cx="65"  cy="355" rx="8"  ry="5"  fill="#FF69B4" transform="rotate(-30,65,355)"/>
    <ellipse cx="95"  cy="355" rx="7"  ry="4"  fill="#FFB6C1" transform="rotate(10,95,355)"/>
    <circle  cx="80"  cy="350" r="3"   fill="#FF85A1"/>

    <!-- bottom-right cluster -->
    <ellipse cx="1050" cy="350" rx="10" ry="6"  fill="#FF69B4" transform="rotate(-20,1050,350)"/>
    <ellipse cx="1070" cy="365" rx="9"  ry="5"  fill="#FFB6C1" transform="rotate(25,1070,365)"/>
    <circle  cx="1060" cy="358" r="4"   fill="#FF85A1"/>

    <!-- small scattered singles -->
    <ellipse cx="200" cy="30"  rx="7"  ry="4"  fill="#FFB6C1" transform="rotate(15,200,30)"/>
    <ellipse cx="350" cy="370" rx="6"  ry="4"  fill="#FF69B4" transform="rotate(-20,350,370)"/>
    <ellipse cx="900" cy="25"  rx="8"  ry="5"  fill="#FFB6C1" transform="rotate(30,900,25)"/>
    <ellipse cx="950" cy="375" rx="7"  ry="4"  fill="#FF69B4" transform="rotate(-15,950,375)"/>
    <ellipse cx="1170" cy="330" rx="7" ry="4"  fill="#FFB6C1" transform="rotate(20,1170,330)"/>
    <ellipse cx="20"  cy="140" rx="6"  ry="4"  fill="#FF85A1" transform="rotate(-10,20,140)"/>
    <ellipse cx="1185" cy="100" rx="6" ry="4"  fill="#FFB6C1" transform="rotate(35,1185,100)"/>
  </g>

  <!-- Logo circle + book icon -->
  <g transform="translate(150, 200)">
    <circle r="80" fill="url(#textGrad)" opacity="0.9"/>
    <!-- Book pages -->
    <g fill="#FFF">
      <path d="M-30,-35 Q-15,-45 0,-38 L0,40 Q-15,35 -30,40 Z"/>
      <path d="M30,-35 Q15,-45 0,-38 L0,40 Q15,35 30,40 Z"/>
      <line x1="0" x2="0" y1="-38" y2="40" stroke="#FFF" stroke-width="4"/>
    </g>
    <!-- Sakura petals beside logo -->
    <ellipse cx="-60" cy="-60" fill="#FFB6C1" rx="12" ry="7" transform="rotate(-30)"/>
    <circle  cx="-56" cy="-64" r="5" fill="#FFB6C1"/>
    <circle  cx="-64" cy="-56" r="5" fill="#FFB6C1"/>
    <circle  cx="-52" cy="-56" r="4" fill="#FF69B4"/>
    <ellipse cx="60"  cy="-50" fill="#FFB6C1" rx="10" ry="6" transform="rotate(45)"/>
    <circle  cx="64"  cy="-54" r="4" fill="#FFB6C1"/>
    <circle  cx="56"  cy="-46" r="4" fill="#FFB6C1"/>
    <circle  cx="68"  cy="-46" r="3" fill="#FF69B4"/>
  </g>

  <!-- App title -->
  <text x="500" y="175" fill="url(#textGrad)"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="80" font-weight="bold">Otaku Reader</text>

  <!-- Tagline -->
  <text x="500" y="235" fill="#8899bb"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="26">The Ultimate Manga Experience</text>

  <!-- Feature pills -->
  <rect x="500" y="275" width="145" height="36" fill="#FF6B6B" opacity="0.9" rx="18"/>
  <text x="572" y="300" fill="#FFF"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="600" text-anchor="middle">2000+ Sources</text>

  <rect x="660" y="275" width="125" height="36" fill="#4ECDC4" opacity="0.9" rx="18"/>
  <text x="722" y="300" fill="#FFF"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="600" text-anchor="middle">Cloud Sync</text>

  <rect x="800" y="275" width="145" height="36" fill="#45B7D1" opacity="0.9" rx="18"/>
  <text x="872" y="300" fill="#FFF"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="600" text-anchor="middle">Perfect Reader</text>
</svg>