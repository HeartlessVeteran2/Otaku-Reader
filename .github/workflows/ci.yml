name: Build Workflow

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detekt:
    name: 🔍 Detekt Static Analysis
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: ☕ Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 🐘 Cache Gradle
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 🔑 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔍 Run Detekt
      run: ./gradlew detekt --no-daemon
      env:
        CI: true

  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: ☕ Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 🐘 Cache Gradle
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: 🔑 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔨 Build (Full Debug)
      run: ./gradlew assembleFullDebug --no-daemon
      env:
        CI: true

    - name: 🔨 Build (FOSS Debug)
      run: ./gradlew assembleFossDebug --no-daemon
      env:
        CI: true

    - name: 🧪 Run Unit Tests
      id: tests
      run: ./gradlew testFullDebugUnitTest testFossDebugUnitTest --no-daemon
      env:
        CI: true
      continue-on-error: true

    - name: 📤 Upload Test Results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
      with:
        name: test-results-${{ github.run_number }}
        path: '**/build/test-results/**/*.xml'
        retention-days: 14

    - name: 📈 Upload JUnit to CI Insights
      if: always()
      uses: mergifyio/gha-mergify-ci@62b45952da6270cad56cce30b8d63276f9d99c88 # v16
      continue-on-error: true
      with:
        token: ${{ secrets.MERGIFY_TOKEN }}
        report_path: "**/build/test-results/**/*.xml"
        job_name: build

    - name: 🚨 Fail if tests failed
      if: steps.tests.outcome == 'failure'
      run: exit 1

    - name: 📊 Upload Build Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
      with:
        name: app-debug-${{ github.run_number }}
        path: |
          app/build/outputs/apk/full/debug/*.apk
          app/build/outputs/apk/foss/debug/*.apk
        retention-days: 7
