name: Android CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "9.3.1"

      - name: Build
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew test
