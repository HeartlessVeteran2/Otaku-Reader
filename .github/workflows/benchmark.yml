name: Benchmark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  benchmark:
    name: Build Time Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile Kotlin
        run: ./gradlew compileFullDebugKotlin --no-daemon
        env:
          CI: true

      - name: Run Build Time Benchmark
        run: |
          echo "## Build Time Benchmark" > benchmark.md
          echo "" >> benchmark.md
          echo "| Step | Time |" >> benchmark.md
          echo "|------|------|" >> benchmark.md

          START=$(date +%s)
          ./gradlew :app:assembleFullDebug --no-daemon
          END=$(date +%s)
          echo "| Full Debug Build | $((END-START))s |" >> benchmark.md

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: benchmark-results
          path: benchmark.md
          retention-days: 30

  baseline-profile:
    name: Generate Baseline Profile
    runs-on: ubuntu-latest
    # Runs on a schedule or manual dispatch; not on every push (emulator needed)
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "system-images;android-34;google_apis;x86_64" \
            "emulator"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Generate Baseline Profile
        run: |
          ./gradlew :baselineprofile:generateBaselineProfile \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            -Pandroid.experimental.testOptions.managedDevices.emulator.showKernelLogging=true \
            --no-daemon
        env:
          CI: true

      - name: Upload Generated Profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: baseline-profile-${{ github.run_number }}
          path: app/src/main/baseline-prof.txt
          retention-days: 90

      - name: Commit updated baseline profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet app/src/main/baseline-prof.txt; then
            echo "Baseline profile unchanged — skipping commit."
          else
            git add app/src/main/baseline-prof.txt
            git commit -m "chore: update baseline profile [skip ci]"
            git push
          fi
