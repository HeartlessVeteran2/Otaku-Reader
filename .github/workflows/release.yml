name: 🏷️ Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
    - name: ☕ Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: 🐘 Cache Gradle
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}

    - name: 🔑 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔐 Set up signing keystore
      run: |
        KEYSTORE_PATH=$(mktemp --suffix=.jks)
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
        printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
          "$KEYSTORE_PATH" \
          "${{ secrets.KEYSTORE_PASSWORD }}" \
          "${{ secrets.KEY_ALIAS }}" \
          "${{ secrets.KEY_PASSWORD }}" > keystore.properties
        echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

    - name: 🔨 Build Full Release
      run: ./gradlew assembleFullRelease --no-daemon
      env:
        CI: true

    - name: 🔨 Build FOSS Release
      run: ./gradlew assembleFossRelease --no-daemon
      env:
        CI: true

    - name: ✅ Verify APK signatures
      run: |
        shopt -s nullglob
        APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner"
        for apk in app/build/outputs/apk/full/release/*.apk app/build/outputs/apk/foss/release/*.apk; do
          echo "Verifying $apk"
          "$APKSIGNER" verify --verbose "$apk"
        done

    - name: 🗑️ Clean up keystore
      if: always()
      run: |
        rm -f "${{ env.KEYSTORE_PATH }}"
        rm -f keystore.properties

    - name: 📝 Generate Release Notes
      run: |
        echo "## 🌸 Otaku Reader ${{ github.ref_name }}" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### What's New" >> RELEASE_NOTES.md
        echo "- See [CHANGELOG.md](CHANGELOG.md) for details" >> RELEASE_NOTES.md
        
    - name: 🚀 Create Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        body_path: RELEASE_NOTES.md
        files: |
          app/build/outputs/apk/full/release/*.apk
          app/build/outputs/apk/foss/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
