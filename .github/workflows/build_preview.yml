name: Preview Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  build-preview:
    name: Build Preview APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Full Debug APK
        run: ./gradlew :app:assembleFullDebug --no-daemon
        env:
          CI: true

      - name: Build FOSS Debug APK
        run: ./gradlew :app:assembleFossDebug --no-daemon
        env:
          CI: true

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts || echo "unknown")
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Upload Full Debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: otaku-reader-full-debug-${{ steps.version.outputs.commit }}
          path: app/build/outputs/apk/full/debug/*.apk
          retention-days: 7

      - name: Upload FOSS Debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: otaku-reader-foss-debug-${{ steps.version.outputs.commit }}
          path: app/build/outputs/apk/foss/debug/*.apk
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const commit = '${{ steps.version.outputs.commit }}';
            const runId = '${{ github.run_id }}';
            const artifactsUrl = `https://github.com/${{ github.repository }}/actions/runs/${runId}`;
            
            const body = `## 📱 Preview Build Available
            
            Commit: \`${commit}\`
            
            **Download APKs:**
            - [Full Debug APK](${artifactsUrl}) (with AI features)
            - [FOSS Debug APK](${artifactsUrl}) (open source only)
            
            Artifacts are available for 7 days.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
