name: Preview Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-preview:
    name: Build Preview APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Full Debug APK
        run: ./gradlew :app:assembleFullDebug --no-daemon
        env:
          CI: true

      - name: Build FOSS Debug APK
        run: ./gradlew :app:assembleFossDebug --no-daemon
        env:
          CI: true

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts || echo "unknown")
          COMMIT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Upload Full Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: otaku-reader-full-debug-${{ steps.version.outputs.commit }}
          path: app/build/outputs/apk/full/debug/*.apk
          retention-days: 7

      - name: Upload FOSS Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: otaku-reader-foss-debug-${{ steps.version.outputs.commit }}
          path: app/build/outputs/apk/foss/debug/*.apk
          retention-days: 7

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const commit = '${{ steps.version.outputs.commit }}';
            const runId = '${{ github.run_id }}';
            const artifactsUrl = `https://github.com/${{ github.repository }}/actions/runs/${runId}`;
            
            const body = `## 📱 Preview Build Available
            
            Commit: \`${commit}\`
            
            **Download APKs:**
            - [Full Debug APK](${artifactsUrl}) (with AI features)
            - [FOSS Debug APK](${artifactsUrl}) (open source only)
            
            Artifacts are available for 7 days.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
