name: Triggered Code Reviews

on:
  pull_request:
    types: [labeled]

jobs:
  ai-review:
    if: github.event.label.name == 'review:ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: AI Code Review
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
      - name: Post AI Review Summary
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **AI Review Bot**\n\nRunning automated code analysis...\n\n- Architecture patterns\n- Potential bugs\n- Performance suggestions\n- Best practices'
            })

  security-review:
    if: github.event.label.name == 'review:security'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Security Scan
        uses: securecodewarrior/github-action-add-sarif@v1
        continue-on-error: true
      - name: Post Security Review
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔒 **Security Review Bot**\n\nScanning for:\n- Hardcoded secrets/credentials\n- SQL injection risks\n- XSS vulnerabilities\n- Insecure dependencies\n- Permission issues'
            })

  style-review:
    if: github.event.label.name == 'review:style'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint
          chmod +x ktlint
          ./ktlint --reporter=json --reporter=plain 2>/dev/null || true
        continue-on-error: true
      - name: Post Style Review
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🎨 **Style Review Bot**\n\nChecked:\n- Kotlin coding conventions\n- Formatting (ktlint)\n- Import organization\n- Naming conventions\n- Code complexity'
            })

  architecture-review:
    if: github.event.label.name == 'review:architecture'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Architecture Review
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            let modulesChanged = new Set();
            files.forEach(f => {
              const match = f.filename.match(/^(feature|core|data|domain)\/([^\/]+)/);
              if (match) modulesChanged.add(match[0]);
            });
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🏗️ **Architecture Review Bot**\n\n' +
                'Modules touched:\n' + 
                Array.from(modulesChanged).map(m => `- ${m}`).join('\n') +
                '\n\nChecking:\n- Clean architecture compliance\n- Module boundaries\n- Dependency direction\n- Feature module isolation'
            });

  tests-review:
    if: github.event.label.name == 'review:tests'
    runs-on: ubuntu-latestn    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Tests
        run: ./gradlew test --continue || true
      - name: Post Test Review
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🧪 **Test Review Bot**\n\nReviewing:\n- Test coverage\n- Test quality\n- Edge cases\n- Mock usage\n- Assertion completeness'
            })

  full-review:
    if: github.event.label.name == 'review:full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Full Review Suite
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 **Full Review Suite**\n\nTriggering all review bots:\n- 🤖 AI Review\n- 🔒 Security Review\n- 🎨 Style Review\n- 🏗️ Architecture Review\n- 🧪 Test Review\n\nPlease re-apply individual labels for detailed feedback.'
            });
            
            // Add individual review labels
            const labels = ['review:ai', 'review:security', 'review:style', 'review:architecture', 'review:tests'];
            for (const label of labels) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [label]
                });
              } catch (e) { /* Label might not exist */ }
            }