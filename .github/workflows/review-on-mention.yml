name: Review on Comment Mention

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  reactions: write

concurrency:
  group: review-mention-${{ github.event.comment.id }}
  cancel-in-progress: true

jobs:
  parse-mention:
    # Only run on PR comments (not regular issues) and only when triggered by comment events
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) || 
      (github.event_name == 'pull_request_review_comment')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      trigger: ${{ steps.parse.outputs.trigger }}
    steps:
      - id: parse
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const login = context.payload.comment.user.login;

            // Only allow collaborators with write access or above to trigger reviews
            let authorized = false;
            try {
              const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: login
              });
              authorized = ['admin', 'maintain', 'write'].includes(perm.permission);
            } catch (e) {
              core.info(`Permission check failed for ${login}: ${e.message}`);
            }

            if (!authorized) {
              core.info(`User ${login} does not have write access. Ignoring review request.`);
              core.setOutput('trigger', '');
              return;
            }

            const body = context.payload.comment.body.toLowerCase();
            const triggers = [];

            if (body.includes('@ai-review') || body.includes('@gemini-review') || body.includes('@aura-review')) {
              triggers.push('ai');
            }
            if (body.includes('@security-review')) {
              triggers.push('security');
            }
            if (body.includes('@style-review') || body.includes('@lint-review')) {
              triggers.push('style');
            }
            if (body.includes('@architecture-review') || body.includes('@arch-review')) {
              triggers.push('architecture');
            }
            if (body.includes('@test-review') || body.includes('@tests-review')) {
              triggers.push('tests');
            }
            if (body.includes('@full-review') || body.includes('@complete-review')) {
              triggers.push('full');
            }
            if (body.includes('@review-help') || body.includes('@help-review')) {
              triggers.push('help');
            }

            core.setOutput('trigger', triggers.join(','));
            console.log('Triggers:', triggers);

            if (triggers.length > 0) {
              try {
                if (context.eventName === 'issue_comment') {
                  await github.rest.reactions.createForIssueComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: context.payload.comment.id,
                    content: 'rocket'
                  });
                } else {
                  await github.rest.reactions.createForPullRequestReviewComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: context.payload.comment.id,
                    content: 'rocket'
                  });
                }
              } catch (e) {
                core.info(`Could not add reaction: ${e.message}`);
              }
            }

  help:
    needs: parse-mention
    if: contains(needs.parse-mention.outputs.trigger, 'help')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post Help Message
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const helpTable = [
              '| Trigger | Description |',
              '|---------|-------------|',
              '| `@ai-review` | AI-powered code review |',
              '| `@security-review` | Security vulnerability scan |',
              '| `@style-review` / `@lint-review` | Code style and formatting |',
              '| `@architecture-review` / `@arch-review` | Architecture compliance |',
              '| `@test-review` / `@tests-review` | Test coverage analysis |',
              '| `@full-review` / `@complete-review` | All reviews combined |',
              '| `@review-help` | Show this help message |',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `👋 **Review Bot Help** — Available triggers (requires write access):\n\n${helpTable}`
            });

  ai-review:
    needs: parse-mention
    if: contains(needs.parse-mention.outputs.trigger, 'ai') || contains(needs.parse-mention.outputs.trigger, 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Post AI Review Request
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            const fileList = files.map(f => `- \`${f.filename}\` (${f.status}, +${f.additions}/-${f.deletions})`).join('\n');
            
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **AI Code Review Requested by @${context.payload.comment.user.login}**\n\nAnalyzing ${files.length} changed files...\n\n${fileList}\n\n---\n\n**Review Areas:**\n- 🏗️ Architecture & Design Patterns\n- 🐛 Potential Bugs & Edge Cases\n- ⚡ Performance Considerations\n- 📋 Best Practices & Conventions\n- 🔒 Security Implications`
            });

  security-review:
    needs: parse-mention
    if: contains(needs.parse-mention.outputs.trigger, 'security') || contains(needs.parse-mention.outputs.trigger, 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Security Scan
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔒 **Security Review Requested by @${context.payload.comment.user.login}**\n\nScanning for:\n- 🔑 Hardcoded secrets / API keys\n- 💉 SQL injection vulnerabilities\n- 🌐 XSS / CSRF risks\n- 📦 Insecure dependencies\n- 🔐 Permission & access issues`
            });

  style-review:
    needs: parse-mention
    if: contains(needs.parse-mention.outputs.trigger, 'style') || contains(needs.parse-mention.outputs.trigger, 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run ktlint
        id: ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint
          chmod +x ktlint
          # Truncate to first 50 violations to keep the PR comment size reasonable
          output=$(./ktlint --relative 2>&1 | head -50 || true)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: Post Style Review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          KTLINT_OUTPUT: ${{ steps.ktlint.outputs.output }}
        with:
          script: |
            const prNumber = context.issue.number;
            const ktlintOutput = process.env.KTLINT_OUTPUT;
            const lintSection = ktlintOutput
              ? `\n\n**ktlint output:**\n\`\`\`\n${ktlintOutput}\n\`\`\``
              : '';
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎨 **Style Review Requested by @${context.payload.comment.user.login}**\n\nChecking:\n- ✅ Kotlin coding conventions\n- ✅ Formatting (ktlint)\n- ✅ Import organization\n- ✅ Naming conventions\n- ✅ Code complexity metrics${lintSection}`
            });

  architecture-review:
    needs: parse-mention
    if: contains(needs.parse-mention.outputs.trigger, 'architecture') || contains(needs.parse-mention.outputs.trigger, 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Architecture Review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            const modules = new Set();
            files.forEach(f => {
              const match = f.filename.match(/^(feature|core|data|domain)\/([^\/]+)/);
              if (match) modules.add(match[0]);
            });
            
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🏗️ **Architecture Review Requested by @${context.payload.comment.user.login}**\n\n**Modules Modified:**\n${Array.from(modules).map(m => `- \`${m}\``).join('\n') || '- None detected'}\n\n**Review Focus:**\n- Clean Architecture compliance\n- Module dependency direction\n- Feature module isolation\n- Repository pattern usage\n- Domain layer purity`
            });

  tests-review:
    needs: parse-mention
    if: contains(needs.parse-mention.outputs.trigger, 'tests') || contains(needs.parse-mention.outputs.trigger, 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test Review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            const testFiles = files.filter(f => f.filename.includes('Test'));
            const hasTests = testFiles.length > 0;
            
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🧪 **Test Review Requested by @${context.payload.comment.user.login}**\n\n**Test Files:** ${hasTests ? testFiles.length + ' found' : '⚠️ None detected'}\n${testFiles.map(f => `- \`${f.filename}\``).join('\n')}\n\n**Review Areas:**\n- Test coverage for new code\n- Edge case handling\n- Mock/stub usage\n- Assertion quality\n- Test naming conventions`
            });
